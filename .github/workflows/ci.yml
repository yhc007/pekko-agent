name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Unit Tests ────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run unit tests (library crates — no DB required)
        run: |
          cargo test \
            -p pekko-agent-events \
            -p pekko-agent-orchestrator \
            -p pekko-agent-security \
            -p pekko-agent-memory \
            -p pekko-agent-tools \
            -- --test-threads=4

  # ── Workspace Compile Check ───────────────────────────────────────────────
  check:
    name: Compile Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc (required by api-gateway gRPC build.rs)
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-check-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo check (entire workspace)
        run: cargo check --workspace

  # ── Clippy Lint ───────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install protoc (required by api-gateway gRPC build.rs)
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run clippy (library crates)
        run: |
          cargo clippy \
            -p pekko-agent-core \
            -p pekko-agent-events \
            -p pekko-agent-orchestrator \
            -p pekko-agent-security \
            -p pekko-agent-memory \
            -p pekko-agent-tools \
            -- -W clippy::all

      - name: Run clippy (service binaries)
        run: |
          cargo clippy \
            -p api-gateway \
            -p ehs-permit-agent \
            -p ehs-inspection-agent \
            -p ehs-compliance-agent \
            -- -W clippy::all -A clippy::too_many_arguments

  # ── Integration Tests ─────────────────────────────────────────────────────
  integration:
    name: Integration Tests (api-gateway)
    runs-on: ubuntu-latest
    needs: [check]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER:     pekko
          POSTGRES_PASSWORD: pekko_secret
          POSTGRES_DB:       pekko_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://pekko:pekko_secret@localhost:5432/pekko_test
      DISABLE_VECTOR_STORE: "true"
      DISABLE_ORCHESTRATOR_PERSISTENCE: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-integration-${{ hashFiles('**/Cargo.lock') }}

      - name: Run integration tests
        run: |
          cargo test -p api-gateway \
            -- --test-threads=1 --nocapture

  # ── Docker Build Smoke Test ───────────────────────────────────────────────
  docker-build:
    name: Docker Build (api-gateway)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [test, check, integration]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build api-gateway image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile
          build-args: SERVICE=api-gateway
          push: false
          tags: pekko-agent/api-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

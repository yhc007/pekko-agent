# ============================================================================
# pekko-agent Docker Compose (컨테이너 배포용)
# ============================================================================
# 로컬 개발은 scripts/run-local.sh 를 사용하세요.
#
# 아키텍처:
#   coreDB      → embedded (in-process)
#   EventBus    → pekko-event-bus (in-process)
#   Qdrant      → 외부 (로컬 바이너리 또는 원격 서버)
#   → Docker에는 인프라 서비스 없음, 애플리케이션 컨테이너만 존재
#
# 사용법:
#   docker compose build
#   docker compose up -d
# ============================================================================

version: "3.9"

services:
  api-gateway:
    build:
      context: .
      dockerfile: infra/Dockerfile
      args:
        SERVICE: api-gateway
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      COREDB_DATA_DIR: /var/lib/coredb
      QDRANT_URL: ${QDRANT_URL:-http://host.docker.internal:6333}
    volumes:
      - coredb-gateway:/var/lib/coredb

  ehs-permit-agent:
    build:
      context: .
      dockerfile: infra/Dockerfile
      args:
        SERVICE: ehs-permit-agent
    ports:
      - "${PERMIT_AGENT_PORT:-50055}:50055"
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      COREDB_DATA_DIR: /var/lib/coredb
      QDRANT_URL: ${QDRANT_URL:-http://host.docker.internal:6333}
    volumes:
      - coredb-permit:/var/lib/coredb
    depends_on:
      - api-gateway

  ehs-inspection-agent:
    build:
      context: .
      dockerfile: infra/Dockerfile
      args:
        SERVICE: ehs-inspection-agent
    ports:
      - "${INSPECTION_AGENT_PORT:-50056}:50056"
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      COREDB_DATA_DIR: /var/lib/coredb
      QDRANT_URL: ${QDRANT_URL:-http://host.docker.internal:6333}
    volumes:
      - coredb-inspection:/var/lib/coredb
    depends_on:
      - api-gateway

  ehs-compliance-agent:
    build:
      context: .
      dockerfile: infra/Dockerfile
      args:
        SERVICE: ehs-compliance-agent
    ports:
      - "${COMPLIANCE_AGENT_PORT:-50057}:50057"
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      COREDB_DATA_DIR: /var/lib/coredb
      QDRANT_URL: ${QDRANT_URL:-http://host.docker.internal:6333}
    volumes:
      - coredb-compliance:/var/lib/coredb
    depends_on:
      - api-gateway

volumes:
  coredb-gateway:
  coredb-permit:
  coredb-inspection:
  coredb-compliance:

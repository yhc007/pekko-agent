    <script>
        // 테이블 데이터를 Excel(.xlsx)로 다운로드
        function downloadTableAsCSV(messageId) {
            const msgEl = document.getElementById('msg-' + messageId);
            if (!msgEl) return;
            
            const table = msgEl.querySelector('table');
            if (!table) {
                alert('테이블을 찾을 수 없습니다.');
                return;
            }
            
            // SheetJS로 테이블을 워크북으로 변환
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.table_to_sheet(table);
            
            // 컬럼 너비 자동 조정
            const cols = [];
            const range = XLSX.utils.decode_range(ws['!ref']);
            for (let c = range.s.c; c <= range.e.c; c++) {
                let maxLen = 10;
                for (let r = range.s.r; r <= range.e.r; r++) {
                    const cell = ws[XLSX.utils.encode_cell({r, c})];
                    if (cell && cell.v) {
                        const len = String(cell.v).length;
                        if (len > maxLen) maxLen = Math.min(len, 50);
                    }
                }
                cols.push({ wch: maxLen + 2 });
            }
            ws['!cols'] = cols;
            
            XLSX.utils.book_append_sheet(wb, ws, 'Data');
            
            // 파일 다운로드
            const filename = 'data_' + new Date().toISOString().slice(0,10) + '.xlsx';
            XLSX.writeFile(wb, filename);
        }
    </script>

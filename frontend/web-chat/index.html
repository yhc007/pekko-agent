<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pekko Agent — EHS AI 채팅</title>
    <link data-trunk rel="rust" data-wasm-opt="z" />
    <style>
        /* ── Reset & Base ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #f7f8fa;
            --sidebar-bg: #1a1d23;
            --sidebar-text: #c9cdd4;
            --sidebar-active: #3b82f6;
            --chat-bg: #ffffff;
            --user-bubble: #3b82f6;
            --user-text: #ffffff;
            --assistant-bubble: #f0f2f5;
            --assistant-text: #1a1d23;
            --border: #e2e5ea;
            --input-bg: #ffffff;
            --input-border: #d1d5db;
            --input-focus: #3b82f6;
            --muted: #6b7280;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --radius: 12px;
        }
        html, body { height: 100%; font-family: var(--font); background: var(--bg); color: #1a1d23; }
        body { display: flex; overflow: hidden; }

        /* ── Sidebar ── */
        .sidebar {
            width: 260px; min-width: 260px;
            background: var(--sidebar-bg);
            display: flex; flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.06);
        }
        .sidebar-header {
            padding: 20px 16px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .sidebar-header h1 {
            font-size: 16px; font-weight: 700; color: #fff;
            display: flex; align-items: center; gap: 8px;
        }
        .sidebar-header h1 .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #22c55e; display: inline-block;
        }
        .sidebar-header p { font-size: 11px; color: var(--muted); margin-top: 4px; }

        .sidebar-section { padding: 12px 12px 4px; }
        .sidebar-section-title {
            font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
            color: var(--muted); margin-bottom: 6px; padding: 0 4px;
        }

        .agent-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px; border-radius: 8px;
            cursor: pointer; transition: background 0.15s;
            color: var(--sidebar-text); font-size: 13px;
        }
        .agent-item:hover { background: rgba(255,255,255,0.06); }
        .agent-item.active { background: var(--sidebar-active); color: #fff; }
        .agent-icon {
            width: 32px; height: 32px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0;
        }
        .agent-icon.permit { background: #fef3c7; }
        .agent-icon.inspection { background: #dbeafe; }
        .agent-icon.compliance { background: #dcfce7; }
        .agent-name { font-weight: 500; }
        .agent-desc { font-size: 11px; color: var(--muted); margin-top: 1px; }

        .new-chat-btn {
            margin: 8px 12px; padding: 10px;
            background: rgba(255,255,255,0.08); border: 1px dashed rgba(255,255,255,0.15);
            border-radius: 8px; color: var(--sidebar-text);
            font-size: 13px; cursor: pointer; text-align: center;
            transition: background 0.15s;
        }
        .new-chat-btn:hover { background: rgba(255,255,255,0.12); }

        .sidebar-footer {
            margin-top: auto; padding: 12px 16px;
            border-top: 1px solid rgba(255,255,255,0.06);
            font-size: 11px; color: var(--muted);
        }
        .status-dot {
            display: inline-block; width: 6px; height: 6px;
            border-radius: 50%; margin-right: 6px;
        }
        .status-dot.healthy { background: #22c55e; }
        .status-dot.unhealthy { background: #ef4444; }
        .status-dot.unknown { background: #eab308; }

        /* ── Main Chat ── */
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

        .chat-header {
            padding: 14px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--chat-bg);
            display: flex; align-items: center; gap: 12px;
        }
        .chat-header-title { font-size: 15px; font-weight: 600; }
        .chat-header-badge {
            font-size: 11px; padding: 2px 8px;
            background: #eff6ff; color: #3b82f6;
            border-radius: 100px; font-weight: 500;
        }

        .messages {
            flex: 1; overflow-y: auto; padding: 24px;
            display: flex; flex-direction: column; gap: 16px;
        }

        .message-row { display: flex; gap: 12px; max-width: 720px; }
        .message-row.user { align-self: flex-end; flex-direction: row-reverse; }
        .message-row.assistant { align-self: flex-start; }

        .message-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; flex-shrink: 0;
        }
        .message-row.user .message-avatar { background: var(--user-bubble); color: #fff; }
        .message-row.assistant .message-avatar { background: #e5e7eb; }

        .message-bubble {
            padding: 12px 16px; border-radius: var(--radius);
            font-size: 14px; line-height: 1.6;
            word-break: break-word; white-space: pre-wrap;
        }
        .message-row.user .message-bubble {
            background: var(--user-bubble); color: var(--user-text);
            border-bottom-right-radius: 4px;
        }
        .message-row.assistant .message-bubble {
            background: var(--assistant-bubble); color: var(--assistant-text);
            border-bottom-left-radius: 4px;
        }

        .tools-used {
            display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px;
        }
        .tool-badge {
            font-size: 10px; padding: 2px 6px;
            background: rgba(59,130,246,0.1); color: #3b82f6;
            border-radius: 4px;
        }

        .typing-indicator {
            display: flex; gap: 4px; padding: 12px 16px;
            background: var(--assistant-bubble); border-radius: var(--radius);
            border-bottom-left-radius: 4px; width: fit-content;
        }
        .typing-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #9ca3af;
            animation: typing 1.4s infinite ease-in-out;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* ── Welcome ── */
        .welcome {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            padding: 40px; color: var(--muted);
        }
        .welcome-icon { font-size: 48px; margin-bottom: 16px; }
        .welcome h2 { font-size: 20px; color: #1a1d23; margin-bottom: 8px; }
        .welcome p { font-size: 14px; max-width: 400px; line-height: 1.6; }
        .welcome-examples {
            display: flex; flex-direction: column; gap: 8px;
            margin-top: 24px;
        }
        .welcome-example {
            padding: 10px 16px; background: #f0f2f5;
            border-radius: 8px; font-size: 13px; color: #374151;
            cursor: pointer; transition: background 0.15s;
        }
        .welcome-example:hover { background: #e5e7eb; }

        /* ── Input ── */
        .input-area {
            padding: 16px 24px 20px;
            border-top: 1px solid var(--border);
            background: var(--chat-bg);
        }
        .input-wrapper {
            display: flex; align-items: flex-end; gap: 8px;
            background: var(--input-bg);
            border: 1.5px solid var(--input-border);
            border-radius: var(--radius); padding: 8px 12px;
            transition: border-color 0.15s;
        }
        .input-wrapper:focus-within { border-color: var(--input-focus); }
        .input-wrapper textarea {
            flex: 1; border: none; outline: none; resize: none;
            font-family: var(--font); font-size: 14px;
            line-height: 1.5; max-height: 120px; min-height: 22px;
            background: transparent;
        }
        .send-btn {
            width: 36px; height: 36px; border-radius: 8px;
            background: var(--user-bubble); border: none;
            color: #fff; cursor: pointer; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.15s;
        }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .send-btn svg { width: 18px; height: 18px; }

        /* ── Token Info ── */
        .token-info {
            font-size: 11px; color: var(--muted);
            margin-top: 6px; text-align: right;
        }

        /* ── Markdown Content ── */
        .md-content p { margin: 4px 0; }
        .md-content br { display: block; margin: 4px 0; }
        .md-content strong { font-weight: 600; }
        .md-content code {
            background: rgba(0,0,0,0.06); padding: 1px 5px;
            border-radius: 4px; font-size: 13px;
            font-family: 'SF Mono', Consolas, monospace;
        }
        .md-content pre {
            background: #1e1e2e; color: #cdd6f4;
            padding: 12px 16px; border-radius: 8px;
            overflow-x: auto; margin: 8px 0; font-size: 13px;
        }
        .md-content pre code {
            background: none; padding: 0; color: inherit;
        }

        /* ── Table ── */
        .md-content .table-wrapper {
            overflow-x: auto; margin: 10px 0;
            border-radius: 8px; border: 1px solid var(--border);
        }
        .md-content table {
            width: 100%; border-collapse: collapse;
            font-size: 13px; white-space: nowrap;
        }
        .md-content thead {
            background: #f1f5f9;
        }
        .md-content th {
            padding: 8px 14px; text-align: left;
            font-weight: 600; color: #374151;
            border-bottom: 2px solid var(--border);
            font-size: 12px; text-transform: none;
        }
        .md-content td {
            padding: 7px 14px; border-bottom: 1px solid #f0f2f5;
            color: #1a1d23;
        }
        .md-content tbody tr:hover {
            background: #f8fafc;
        }
        .md-content tbody tr:last-child td {
            border-bottom: none;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .sidebar { display: none; }
        }
    </style>
</head>
<body>
</body>
</html>

# ============================================================================
# Ingress вҖ” api-gatewayлҘј мҷёл¶Җм—җ л…ём¶ңн•©лӢҲлӢӨ.
# nginx ingress controller к°Җм • (cert-manager мҳөм…ҳ).
#
# м Ғмҡ©:
#   kubectl apply -f 06-ingress.yaml
#
# TLS мқёмҰқм„ң мһҗлҸҷнҷ” (cert-manager):
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
#   # к·ё лӢӨмқҢ м•„лһҳ ClusterIssuer мғқм„ұ нӣ„ tls м„№м…ҳ мЈјм„қ н•ҙм ң
# ============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway-ingress
  namespace: pekko-agent
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target:  /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  rules:
    - host: pekko-agent.example.com   # мӢӨм ң лҸ„л©”мқёмңјлЎң ліҖкІҪ
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
  # tls:
  #   - hosts:
  #       - pekko-agent.example.com
  #     secretName: pekko-agent-tls

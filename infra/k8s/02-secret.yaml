# ============================================================================
# pekko-agent Secrets — 프로덕션 배포 전 반드시 실제 값으로 변경하세요.
#
# 값은 base64 인코딩:  echo -n 'your-value' | base64
#
# 또는 kubectl로 직접 생성:
#   kubectl create secret generic pekko-agent-secrets \
#     --namespace pekko-agent \
#     --from-literal=CLAUDE_API_KEY='sk-ant-...' \
#     --from-literal=JWT_SECRET='...' \
#     --from-literal=ADMIN_API_KEY='...' \
#     --from-literal=AGENT_API_KEY='...' \
#     --from-literal=POSTGRES_PASSWORD='...'
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: pekko-agent-secrets
  namespace: pekko-agent
type: Opaque
stringData:
  CLAUDE_API_KEY:    "REPLACE_WITH_REAL_KEY"
  JWT_SECRET:        "REPLACE_WITH_32_CHAR_SECRET"
  ADMIN_API_KEY:     "REPLACE_WITH_ADMIN_API_KEY"
  AGENT_API_KEY:     "REPLACE_WITH_AGENT_API_KEY"
  POSTGRES_PASSWORD: "REPLACE_WITH_DB_PASSWORD"
